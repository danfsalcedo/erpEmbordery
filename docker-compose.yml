services:
  db:
    image: postgres:16
    container_name: erp_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: erp_backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["./entrypoint.sh"]

  # Frontend en contenedor: NO arranca por defecto. En desarrollo el front se corre
  # nativo con `pnpm dev` (HMR más rápido, sin polling). Este servicio queda disponible
  # solo bajo el profile `full`, para una prueba integrada en contenedor si se quiere:
  #   docker compose --profile full up
  # En producción el front se sirve como build estático (Nginx), no con este dev server.
  frontend:
    build: ./frontend
    container_name: erp_frontend
    profiles: ["full"]
    depends_on:
      - backend
    environment:
      # El navegador habla con el backend en localhost:8000 (puerto publicado)
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Se invoca Vite directamente (no `pnpm dev`) para evitar que pnpm 11 intente
    # reinstalar dependencias al arrancar; ya vienen listas en la imagen.
    command: ["node_modules/.bin/vite", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  pgdata:
